<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco Acme - Recuperar Contraseña</title>

    <!-- Aplicar tema guardado antes de mostrar la página -->
    <script>
        var temaGuardado = localStorage.getItem("acmebank_tema");
        if (temaGuardado === "dark") {
            document.documentElement.setAttribute("data-theme", "dark");
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="icon" href="resources/iconpage.png">
</head>
<body class="page-auth">
    <!-- Botón para cambiar entre modo claro y oscuro -->
    <button class="theme-toggle" id="btnTema" onclick="toggleTema()" title="Cambiar tema"></button>

    <div class="auth-container">
        <div class="auth-card">

            <div class="auth-header">
                <div class="logo">
                    <div class="logo-icon"><svg viewBox="0 0 24 28" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L23 26H16.5L12 16L7.5 26H1L12 2Z" fill="white" opacity="0.96"/><rect x="6.5" y="19.5" width="11" height="2.5" rx="0.5" fill="#0b1a3d"/></svg></div>
                    <div class="logo-brand-block"><span class="logo-brand-main">ACME</span><span class="logo-brand-sub">BANCO</span></div>
                </div>
                <p class="auth-subtitle">Recuperar contraseña</p>
            </div>

            <!-- Formulario -->
            <div id="formVerificar">
                <p class="info-text" >
                    Ingrese sus datos para verificar su identidad.
                </p>

                <div class="form-group">
                    <label for="recTipoId">Tipo de Identificación</label>
                    <select id="recTipoId" required>
                        <option value="">Seleccione...</option>
                        <option value="CC">Cédula de Ciudadanía</option>
                        <option value="TI">Tarjeta de Identidad</option>
                        <option value="CE">Cédula de Extranjería</option>
                        <option value="PP">Pasaporte</option>
                    </select>
                    <span class="error-msg" id="errRecTipoId"></span>
                </div>

                <div class="form-group">
                    <label for="recNumId">Número de Identificación</label>
                    <input type="text" id="recNumId" placeholder="Ingrese su número">
                    <span class="error-msg" id="errRecNumId"></span>
                </div>

                <div class="form-group">
                    <label for="recEmail">Correo Electrónico registrado</label>
                    <input type="email" id="recEmail" placeholder="correo@ejemplo.com">
                    <span class="error-msg" id="errRecEmail"></span>
                </div>

                <div class="btn-group">
                    <button class="btn btn-secondary" onclick="window.location.href='index.html'">Cancelar</button>
                    <button class="btn btn-primary" onclick="verificarIdentidad()">Verificar</button>
                </div>

                <div id="mensajeVerificar" class="alert alert-error" style="display:none;"></div>
            </div>

            <!--- Nueva contraseña  -->
            <div id="formNuevaPass" style="display:none;">
                <p class="info-text" style="text-align:left; padding: 0 0 20px 0; color: var(--verde);">
                    Identidad verificada. Ingrese su nueva contraseña.
                </p>

                <div class="form-group">
                    <label for="nuevaPass">Nueva Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="nuevaPass" placeholder="Mínimo 8 caracteres">
                        <button type="button" class="toggle-pass" onclick="togglePassword('nuevaPass', this)" aria-label="Mostrar contraseña">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <span class="error-msg" id="errNuevaPass"></span>
                </div>

                <div class="form-group">
                    <label for="confirmarNuevaPass">Confirmar Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmarNuevaPass" placeholder="Repita la contraseña">
                        <button type="button" class="toggle-pass" onclick="togglePassword('confirmarNuevaPass', this)" aria-label="Mostrar contraseña">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <span class="error-msg" id="errConfirmarNuevaPass"></span>
                </div>

                <button class="btn btn-primary" onclick="cambiarContrasena()">Cambiar Contraseña</button>

                <div id="mensajeCambio" class="alert" style="display:none;"></div>
            </div>

        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/recuperar.js"></script>
</body>
</html>
